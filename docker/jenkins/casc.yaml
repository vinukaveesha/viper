jenkins:
  systemMessage: "Code Review Agent Jenkins (auto-configured)"
  numExecutors: 2

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              id: "SCM_TOKEN"
              description: "SCM API token"
              secret: "${SCM_TOKEN}"
          - string:
              id: "GOOGLE_API_KEY"
              description: "Google Gemini API key"
              secret: "${GOOGLE_API_KEY}"

jobs:
  - script: >
      def jenkinsfile = new File('/var/jenkins_home/jenkinsfiles/code-review.Jenkinsfile')
      if (!jenkinsfile.exists()) {
        throw new RuntimeException('Missing Jenkinsfile at /var/jenkins_home/jenkinsfiles/code-review.Jenkinsfile')
      }
      def scriptText = jenkinsfile.text
      pipelineJob('code-review') {
        definition {
          cps {
            script(scriptText)
            sandbox(true)
          }
        }
        properties {
          pipelineTriggers {
            triggers {
              genericTrigger {
                token('')
                tokenCredentialId('')
                printContributedVariables(false)
                printPostContent(false)
                regexpFilterText('')
                regexpFilterExpression('')
                causeString('Generic Cause')
                silentResponse(false)
                genericVariables {
                  genericVariable {
                    key('SCM_OWNER')
                    value('$.pull_request.base.repo.owner.login')
                    expressionType('JSONPath')
                  }
                  genericVariable {
                    key('SCM_REPO')
                    value('$.pull_request.base.repo.name')
                    expressionType('JSONPath')
                  }
                  genericVariable {
                    key('SCM_PR_NUM')
                    value('$.pull_request.number')
                    expressionType('JSONPath')
                  }
                  genericVariable {
                    key('SCM_HEAD_SHA')
                    value('$.pull_request.head.sha')
                    expressionType('JSONPath')
                  }
                }
              }
            }
          }
        }
      }
