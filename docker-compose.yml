# Gitea + Jenkins for local testing. Agent is NOT a service; run via:
#   docker run --rm --network code-review_code-review-net -e SCM_* -e LLM_* code-review-agent review
# Build agent image from repo root: docker build -t code-review-agent -f docker/Dockerfile.agent .
# Network name uses project name "code-review" (set below); if you use -p othername, use othername_code-review-net.

name: code-review

services:
  gitea:
    image: gitea/gitea:1.21.4
    container_name: code-review-gitea
    environment:
      GITEA__server__DOMAIN: localhost
      GITEA__server__ROOT_URL: http://localhost:3000
      GITEA__server__HTTP_PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - gitea_data:/data
    networks:
      - code-review-net

  jenkins:
    image: jenkins/jenkins:2.449-jdk17
    container_name: code-review-jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./docker/jenkins:/jenkins-config
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
    networks:
      - code-review-net

volumes:
  gitea_data:
  jenkins_home:

networks:
  code-review-net:
    driver: bridge
