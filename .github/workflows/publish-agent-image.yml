name: Publish code-review agent image (on demand)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag to push to Docker Hub (e.g. v1.2.3 or latest)"
        required: true
        default: "latest"
      push_latest:
        description: "Also push the 'latest' tag?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      # The Docker Hub repository to push to, e.g. "myuser/code-review-agent".
      # Set DOCKERHUB_REPO in repo or org variables if you want a fixed name,
      # otherwise we derive it from DOCKERHUB_USERNAME.
      DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Docker Hub repo name
        id: repo_name
        run: |
          if [ -n "${DOCKERHUB_REPO}" ]; then
            echo "repo=${DOCKERHUB_REPO}" >> "$GITHUB_OUTPUT"
          else
            if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
              echo "DOCKERHUB_REPO or DOCKERHUB_USERNAME must be set" >&2
              exit 1
            fi
            echo "repo=${{ secrets.DOCKERHUB_USERNAME }}/code-review-agent" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.agent
          push: true
          tags: >
            ${{ steps.repo_name.outputs.repo }}:${{ github.event.inputs.image_tag }}
            ${{ github.event.inputs.push_latest == 'true' && format('{0}:latest', steps.repo_name.outputs.repo) || '' }}

