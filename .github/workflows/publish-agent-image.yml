name: Publish code-review agent image (on demand)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag to push to Docker Hub (e.g. v1.2.3 or latest)"
        required: true
        default: "latest"
      push_latest:
        description: "Also push the 'latest' tag?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Ensure Docker Hub repo name
        id: repo_name
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "${DOCKERHUB_REPO}" ] && [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "Set DOCKERHUB_REPO (variable) or DOCKERHUB_USERNAME (secret) to specify the Docker Hub repository." >&2
            exit 1
          fi
          if [ -n "${DOCKERHUB_REPO}" ]; then
            echo "repo=${DOCKERHUB_REPO}" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${DOCKERHUB_USERNAME}/code-review-agent" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@369ebfd91f94d1f28b499920359052457febfeb0 # v5.7.0
        with:
          images: ${{ steps.repo_name.outputs.repo }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event.inputs.push_latest == 'true' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile.agent
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

