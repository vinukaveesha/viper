name: Publish code-review agent image (on demand)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag to push to Docker Hub (e.g. v1.2.3 or latest)"
        required: true
        default: "latest"
      push_latest:
        description: "Also push the 'latest' tag?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      # The Docker Hub repository to push to, e.g. "myuser/code-review-agent".
      # Set DOCKERHUB_REPO in repo or org variables if you want a fixed name,
      # otherwise we derive it from DOCKERHUB_USERNAME.
      DOCKERHUB_REPO: ${{ vars.DOCKERHUB_REPO }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Secret passed via env only; run block uses $DOCKERHUB_USERNAME (no secret expansion in run).
      - name: Ensure Docker Hub repo name
        id: repo_name
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "${DOCKERHUB_REPO}" ] && [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "Set DOCKERHUB_REPO (variable) or DOCKERHUB_USERNAME (secret) to specify the Docker Hub repository." >&2
            exit 1
          fi
          if [ -n "${DOCKERHUB_REPO}" ]; then
            echo "repo=${DOCKERHUB_REPO}" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${DOCKERHUB_USERNAME}/code-review-agent" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/Dockerfile.agent
          push: true
          tags: |
            ${{ steps.repo_name.outputs.repo }}:${{ github.event.inputs.image_tag }}
            ${{ github.event.inputs.push_latest == 'true' && format('{0}:latest', steps.repo_name.outputs.repo) || '' }}

