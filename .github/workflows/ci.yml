name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          source .venv/bin/activate
          ruff check src tests

      - name: Run tests
        env:
          PYTHONWARNINGS: ignore
        run: |
          source .venv/bin/activate
          pytest --ignore=tests/e2e --maxfail=1 --disable-warnings -q

